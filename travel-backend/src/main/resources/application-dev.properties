# dotenv (solo local)
springdotenv.directory=.
springdotenv.filename=.env
springdotenv.ignoreIfMissing=true
springdotenv.systemProperties=true
springdotenv.exportToSystemProperties=true

# ====== DATABASE ======
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ====== JWT ======
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}

app.features.file-path=${user.dir}/travel-backend/config/features.json

# ====== Swagger ======
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true