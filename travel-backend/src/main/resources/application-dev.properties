# ====== DOTENV (Busca el .env en la raíz) ======
springdotenv.directory=./
springdotenv.filename=.env
springdotenv.ignoreIfMissing=false
springdotenv.systemProperties=true
springdotenv.exportToSystemProperties=true

# ====== INYECCIÓN DESDE EL .env ======
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# ====== CONFIGURACIONES LOCALES ======
app.features.file-path=./config/features.json
app.features.admin-logs-enabled=true

# ====== SWAGGER ACTIVO EN DESARROLLO ======
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true