spring.profiles.active=dev
spring.application.name=travel-backend

# ===== JPA =====
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ===== LOGS =====
logging.file.name=logs/app.log
logging.level.root=INFO
logging.level.com.traveling.travel_backend=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===== FEATURES =====
app.features.file-path=./config/features.json
app.features.admin-logs-enabled=true

# ===== MAIL =====
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== FRONTEND =====
app.frontend.url=${FRONTEND_URL}

# ===== TRANSLATOR AZURE =====
translator.azure.key=${AZURE_TRANSLATOR_KEY}
translator.azure.region=${AZURE_TRANSLATOR_REGION:eastus}
translator.azure.endpoint=${AZURE_TRANSLATOR_ENDPOINT:https://api.cognitive.microsofttranslator.com}

# ===== TRANSLATOR GOOGLE =====
translator.google.api-key=${GOOGLE_TRANSLATE_API_KEY}
translator.google.endpoint=https://translation.googleapis.com