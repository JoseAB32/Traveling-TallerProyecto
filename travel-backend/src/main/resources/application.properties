spring.application.name=travel-backend

# dotenv.directory=travel-backend
springdotenv.directory=travel-backend
springdotenv.filename=.env
springdotenv.ignoreIfMissing=true
springdotenv.systemProperties=true
springdotenv.exportToSystemProperties=true

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update

# spring.datasource.hikari.maximum-pool-size=1
# spring.datasource.hikari.keepalive-time=300000

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}

logging.file.name=logs/app.log
logging.level.root=INFO 
logging.level.com.traveling.travel_backend=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

app.features.admin-logs-enabled=true