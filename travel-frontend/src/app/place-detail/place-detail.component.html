<app-header></app-header>

<div class="place-detail-container">

  <!-- 🔄 LOADING -->
  <div *ngIf="loading" class="loading-container">
    <div class="spinner"></div>
    <p>Cargando lugar...</p>
  </div>

  <!-- ❌ ERROR -->
  <div *ngIf="!loading && !place" class="error-container">
    <p class="error-message">Lugar no encontrado</p>
  </div>

  <!-- ✅ CONTENIDO -->
  <div *ngIf="place">

    <!-- 🔶 BARRA DE TÍTULO -->
    <div class="title-bar">
      <span class="location-name">{{ place.name }}</span>
      <span class="favorite-icon">♡</span>
    </div>

    <!-- 🖼️ CARRUSEL -->
    <div class="carousel-container">

      <!-- Flechas -->
      <button class="arrow left" (click)="prevImage()">‹</button>
      <button class="arrow right" (click)="nextImage()">›</button>

      <!-- Imagen -->
      <div class="carousel-image">
        <img [src]="'/' + place.image_url" alt="Imagen lugar">
      </div>

      <!-- Indicadores -->
      <div class="carousel-indicators">
        <span class="dot active"></span>
      </div>

    </div>

    <!-- 📊 INFO -->
    <div class="info-section">

      <!-- IZQUIERDA -->
      <div class="info-card info-general">
        <div class="card-title">Información general</div>
        <p class="description">
          {{ place.description }}
        </p>
      </div>

      <!-- DERECHA -->
      <div class="info-card info-lugar">
        <div class="card-title">Información del lugar</div>

        <div class="info-list">

          <div class="info-item">
            <span class="info-icon">📍</span>
            <span class="info-text">{{ place.address }}</span>
          </div>

          <div class="info-item">
            <span class="info-icon">⭐</span>
            <span class="stars">{{ getStars(place.rating) }}</span>
          </div>

          <div class="info-item" *ngIf="place.is_event">
            <span class="info-icon">📅</span>
            <span class="info-text">
              {{ place.start_date }} - {{ place.end_date }}
            </span>
          </div>

        </div>
      </div>

    </div>

  </div>

</div>

<app-footer></app-footer>
