<div class="register-container">
  <div class="register-card">
    <h1 class="register-title outfit-semibold">REGISTRARSE</h1>
    
    <div *ngIf="error" class="alert alert-error outfit-regular">
      {{ error }}
    </div>
    
    <div *ngIf="successMessage" class="alert alert-success outfit-regular">
      {{ successMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="register-form">
      <div class="form-group">
        <label for="userName" class="form-label outfit-medium">Usuario *</label>
        <input 
          type="text" 
          id="userName"
          name="userName"
          [(ngModel)]="user.userName"
          required
          minlength="3"
          #userName="ngModel"
          placeholder="usuario123"
          class="form-control outfit-regular"
          [class.error]="userName.invalid && userName.touched"
        >
        <div *ngIf="userName.invalid && userName.touched" class="error-message outfit-light">
          <div *ngIf="userName.errors?.['required']">El usuario es requerido</div>
          <div *ngIf="userName.errors?.['minlength']">Mínimo 3 caracteres</div>
        </div>
      </div>

      <div class="form-group">
        <label for="correo" class="form-label outfit-medium">Correo electrónico *</label>
        <input 
          type="email" 
          id="correo"
          name="correo"
          [(ngModel)]="user.correo"
          required
          email
          #correo="ngModel"
          placeholder="ejemplo@correo.com"
          class="form-control outfit-regular"
          [class.error]="correo.invalid && correo.touched"
        >
        <div *ngIf="correo.invalid && correo.touched" class="error-message outfit-light">
          <div *ngIf="correo.errors?.['required']">El correo es requerido</div>
          <div *ngIf="correo.errors?.['email']">Correo inválido</div>
        </div>
      </div>

      <div class="form-group">
        <label for="pass" class="form-label outfit-medium">Contraseña *</label>
        <input 
          type="password" 
          id="pass"
          name="pass"
          [(ngModel)]="user.pass"
          required
          minlength="4"
          #pass="ngModel"
          placeholder="••••••••"
          class="form-control outfit-regular"
          [class.error]="pass.invalid && pass.touched"
        >
        <div *ngIf="pass.invalid && pass.touched" class="error-message outfit-light">
          <div *ngIf="pass.errors?.['required']">La contraseña es requerida</div>
          <div *ngIf="pass.errors?.['minlength']">Mínimo 4 caracteres</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="birthday" class="form-label outfit-medium">Fecha de nacimiento</label>
          <input 
            type="date" 
            id="birthday"
            name="birthday"
            [(ngModel)]="user.birthday"
            class="form-control outfit-regular"
          >
        </div>

        <div class="form-group half">
          <label for="city" class="form-label outfit-medium">Ciudad</label>
          <input 
            type="text" 
            id="city"
            name="city"
            [(ngModel)]="user.city"
            placeholder="Tu ciudad"
            class="form-control outfit-regular"
          >
        </div>
      </div>

      <button 
        type="submit" 
        [disabled]="registerForm.invalid || loading"
        class="btn-register outfit-semibold"
      >
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'REGISTRANDO...' : 'REGISTRARSE' }}
      </button>
    </form>

    <p class="login-link outfit-regular">
      ¿Ya tienes cuenta? 
      <a routerLink="/login" class="login-link-text outfit-medium">Inicia Sesión</a>
    </p>
  </div>
</div>
