<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/" class="nav-brand">✈️ Travel App</a>
    <div class="nav-menu">
      <ng-container *ngIf="!(authService.currentUser$ | async)">
        <a routerLink="/login" class="nav-link">Iniciar Sesión</a>
        <a routerLink="/register" class="nav-link btn-primary">Registrarse</a>
      </ng-container>
      <ng-container *ngIf="authService.currentUser$ | async as user">
        <span class="nav-user">👤 {{user.username}}</span>
        <button (click)="authService.logout()" class="nav-link btn-logout">Cerrar Sesión</button>
      </ng-container>
    </div>
  </div>
</nav>

<main class="container">
  <router-outlet></router-outlet>
</main>
