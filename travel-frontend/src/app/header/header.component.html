<nav class="header">
    <div class="logo" routerLink="/InicioLogueado">
      <img src="traveling2white.svg" alt="Traveling Logo">
    </div>
    @if (isLoggedIn) {
    <div class="search-container">
      <div class="search-bar" [ngClass]="{'active': showSuggestions && suggestions.length > 0}">
        <input 
          type="text" 
          placeholder="Buscar departamento o lugar"
          [value]="searchTerm"
          (input)="onSearch($event)"
          (focus)="showSuggestions = suggestions.length > 0"
        >
        <button class="search-btn" (click)="goToSearch()">
          <img src="iconoBusqueda.svg" alt="Buscar"> 
        </button>
      </div>

      @if (showSuggestions && suggestions.length > 0) {
        <div class="suggestions-dropdown">
          @for (s of suggestions; track s.id) {
            <div class="suggestion-item" (click)="selectSuggestion(s)">
              <div class="suggestion-info">
                <span class="suggestion-name">{{ s.name }}</span>
                <small class="suggestion-detail">{{ s.city?.name }} - {{ s.address }}</small>
              </div>
            </div>
          }
        </div>
      }
    </div>

    <div class="profile-container">
      <img 
        src="favicon.ico" 
        alt="Perfil" 
        class="profile-pic" 
        (click)="toggleMenu()"
      >

      @if (isMenuOpen) {
        <div class="dropdown-menu">
          <div class="menu-item">
            <img src="iconoPerfil.svg" alt=""> <span>Perfil</span>
          </div>
          <div class="menu-item">
            <img src="iconoItinerario.svg" alt=""> <span>Itinerarios</span>
          </div>
          <div class="menu-item">
            <img src="iconoWishList.svg" alt=""> <span [routerLink]="['/wishlist']">Wishlist</span>
          </div>
          <div class="menu-item logout">
            <img src="Logout.svg" alt="">
            <span (click)="logout()">Cerrar Sesión</span>
          </div>
        </div>
      }
    </div>
  }
</nav>
