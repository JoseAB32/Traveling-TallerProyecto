<main class="content">

  <!-- LOGO -->
  <section class="img-container" (click)="goToLanding()">
    <div class="logo">
      <img src="traveling2white.svg" alt="Logo Traveling" />
    </div>
  </section>

  <!-- FORM -->
  <section class="form-container">

    <form #form="ngForm" (ngSubmit)="onSubmit(form)" class="form-login">

      <!-- VOLVER -->
      <div class="login-container">
        <a [routerLink]="['/login']">Volver al login</a>
      </div>

      <!-- TÍTULO -->
      <div class="title-container">
        <h1>Restablece tu contraseña</h1>
      </div>

      <!-- DESCRIPCIÓN -->
      <p class="description">
        ¡Es hora de renovarse! Crea una nueva clave secreta.
      </p>

      <!-- PASSWORD -->
      <div class="input-container">
        <input
          type="password"
          class="form-input"
          name="password"
          [(ngModel)]="password"
          required
          minlength="6"
          #passwordInput="ngModel"
          placeholder=" "
          [class.input-error]="passwordInput.invalid && (passwordInput.touched || passwordInput.dirty)"
        />

        <label class="label-form"
          [class.label-error]="passwordInput.invalid && (passwordInput.touched || passwordInput.dirty)">
          Nueva contraseña
        </label>

        <div class="error-container"
          *ngIf="passwordInput.invalid && (passwordInput.touched || passwordInput.dirty)">
          <p *ngIf="passwordInput.errors?.['required']">La contraseña es obligatoria</p>
          <p *ngIf="passwordInput.errors?.['minlength']">Mínimo 6 caracteres</p>
        </div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="input-container">
        <input
          type="password"
          class="form-input"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          #confirmInput="ngModel"
          placeholder=" "
          [class.input-error]="confirmPassword !== password && confirmInput.touched"
        />

        <label class="label-form"
          [class.label-error]="confirmPassword !== password && confirmInput.touched">
          Confirmar contraseña
        </label>

        <div class="error-container"
          *ngIf="confirmPassword !== password && confirmInput.touched">
          <p>Las contraseñas no coinciden</p>
        </div>
      </div>

      <!-- MENSAJES -->
      <div *ngIf="error" class="alert alert-error">
        {{ error }}
      </div>

      <!-- BOTÓN -->
      <div class="button-container">
        <button type="submit" [disabled]="loading || confirmPassword !== password">
          Confirmar cambios
        </button>
      </div>

    </form>

  </section>
</main>
