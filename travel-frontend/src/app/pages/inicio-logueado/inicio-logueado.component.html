      <div
        class="tooltip"
        *ngIf="hoverDepto"
        [style.left.px]="tooltipX"
        [style.top.px]="tooltipY">
        {{ hoverDepto }}
      </div>
    </div>

    <div class="texto-container">
      <h2 class="mapa-texto text-dark">
        {{ 'inicioLogueado.elige_y_empieza' | transloco }}
      </h2>
    </div>
  </section>

  <!-- LUGARES -->
  <section class="lugares-section">
    <div class="container">

      <h3 class="text-orange">
        {{ 'inicioLogueado.mejores_lugares' | transloco }}
      </h3>

      <!-- LOADING -->
      <div *ngIf="isLoading" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>

      <!-- CARRUSEL -->
      <div *ngIf="!isLoading && featuredPlaces.length > 0" class="carousel-wrapper">

        <button class="carousel-btn carousel-btn-prev" (click)="prev()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
            <path fill="currentColor" d="M201.4 297.4C188.9 309.9 188.9 330.2 201.4 342.7L361.4 502.7C373.9 515.2 394.2 515.2 406.7 502.7C419.2 490.2 419.2 469.9 406.7 457.4L269.3 320L406.6 182.6C419.1 170.1 419.1 149.8 406.6 137.3C394.1 124.8 373.8 124.8 361.3 137.3L201.3 297.3z"/>
          </svg>
        </button>
        <button class="carousel-btn carousel-btn-next" (click)="next()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
            <path fill="currentColor" d="M439.1 297.4C451.6 309.9 451.6 330.2 439.1 342.7L279.1 502.7C266.6 515.2 246.3 515.2 233.8 502.7C221.3 490.2 221.3 469.9 233.8 457.4L371.2 320L233.9 182.6C221.4 170.1 221.4 149.8 233.9 137.3C246.4 124.8 266.7 124.8 279.2 137.3L439.2 297.3z"/>
          </svg>
        </button>

        <div class="carousel-viewport">
        <div class="carousel-container"
             [style.transform]="trackTransform"
             [style.transition]="trackTransition"
             (transitionend)="onTrackTransitionEnd()">

          <div *ngFor="let place of carouselPlaces; let i = index; trackBy: trackByPlaceId"
            class="tarjeta"
            [style.flex]="cardFlex"
            [style.max-width]="cardWidth">

            <div
              class="card-background" 
              [ngClass]="{
                'bg-orange-soft': isPeachPlace(i),
                'bg-blue-dark': !isPeachPlace(i)
              }"
              (click)="goToDetail(place.id)"
              style="cursor: pointer;">

              <!-- ✅ IMAGEN CORRECTA -->
              <img
                [src]="place.imageUrl"
                class="card-imagen"
                [alt]="place.name"
              /> 

              <div class="info-container"> 

                <h5 class="nombre-container">
                  {{ place.name }}
                </h5>

                <div class="stars" 
                  [ngClass]="{ 'text-different': isPeachPlace(i) }"> 
                  <ng-container *ngFor="let filled of getStarsArray(place.rating)">
                    <svg *ngIf="filled" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                      <path fill="currentColor" d="M341.5 45.1C337.4 37.1 329.1 32 320.1 32C311.1 32 302.8 37.1 298.7 45.1L225.1 189.3L65.2 214.7C56.3 216.1 48.9 222.4 46.1 231C43.3 239.6 45.6 249 51.9 255.4L166.3 369.9L141.1 529.8C139.7 538.7 143.4 547.7 150.7 553C158 558.3 167.6 559.1 175.7 555L320.1 481.6L464.4 555C472.4 559.1 482.1 558.3 489.4 553C496.7 547.7 500.4 538.8 499 529.8L473.7 369.9L588.1 255.4C594.5 249 596.7 239.6 593.9 231C591.1 222.4 583.8 216.1 574.8 214.7L415 189.3L341.5 45.1z"/>
                    </svg>
                    <svg *ngIf="!filled" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                      <path fill="currentColor" d="M320.1 32C329.1 32 337.4 37.1 341.5 45.1L415 189.3L574.9 214.7C583.8 216.1 591.2 222.4 594 231C596.8 239.6 594.5 249 588.2 255.4L473.7 369.9L499 529.8C500.4 538.7 496.7 547.7 489.4 553C482.1 558.3 472.4 559.1 464.4 555L320.1 481.6L175.8 555C167.8 559.1 158.1 558.3 150.8 553C143.5 547.7 139.8 538.8 141.2 529.8L166.4 369.9L52 255.4C45.6 249 43.4 239.6 46.2 231C49 222.4 56.3 216.1 65.3 214.7L225.2 189.3L298.8 45.1C302.9 37.1 311.2 32 320.2 32zM320.1 108.8L262.3 222C258.8 228.8 252.3 233.6 244.7 234.8L119.2 254.8L209 344.7C214.4 350.1 216.9 357.8 215.7 365.4L195.9 490.9L309.2 433.3C316 429.8 324.1 429.8 331 433.3L444.3 490.9L424.5 365.4C423.3 357.8 425.8 350.1 431.2 344.7L521 254.8L395.5 234.8C387.9 233.6 381.4 228.8 377.9 222L320.1 108.8z"/>
                    </svg>
                    </ng-container>
                </div>

              </div>
            </div>

          </div>
        </div>

        <!-- INDICADORES -->
        <div class="indicadores-container" role="tablist" aria-label="Navegacion del carrusel">
          <button
            *ngFor="let _ of featuredPlaces; index as pageIndex"
            type="button"
            class="btn-indicador"
            [class.active]="pageIndex === currentIndex"
            [attr.aria-label]="'Ir al lugar ' + (pageIndex + 1)"
            [attr.aria-selected]="pageIndex === currentIndex"
            (click)="goTo(pageIndex)"></button>
        </div>
        </div>
      </div>
    </div>
  </section>
</main>

<app-footer></app-footer>
