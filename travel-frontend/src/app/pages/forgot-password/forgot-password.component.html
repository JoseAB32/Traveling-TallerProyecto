<div class="bg-pattern">

  <div class="container">

    <div class="logo">TRAVELING</div>

    <div class="card">

      <div class="back">
        <a routerLink="/login">← Volver a inicio de sesión</a>
      </div>

      <h2>RECUPERA TU CONTRASEÑA</h2>

      <p>
        Ingresa el correo registrado para enviarte un link con el que podrás recuperar tu contraseña.
      </p>

      <input [(ngModel)]="correo" placeholder="Correo electrónico" />

      <button (click)="enviar()" [disabled]="loading">
        {{ loading ? 'Enviando...' : 'ENVIAR LINK' }}
      </button>

      <p class="mensaje">{{ mensaje }}</p>

    </div>

  </div>

</div>
