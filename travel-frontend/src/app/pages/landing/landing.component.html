<app-header></app-header>
<div class="landing-container">
  <section class="section hero white-bg">
    <div class="content-wrapper">
      <div class="image-collage">
        <img src="asset_2.png" class="img-top" alt="Dakar">
        <img src="asset_1.png" class="img-left" alt="Cristo">
        <img src="asset_3.png" class="img-bottom" alt="Lago">
      </div>
      <div class="text-block">
        <h1>{{ 'landing.textStartHere' | transloco }}</h1>
        <div class="cta-buttons">
          <button class="btn btn-primary" (click)="irASignUp()">
            {{ 'landing.signUp' | transloco }}
          </button>
          <button class="btn btn-outline" (click)="irALogIn()">
            {{ 'landing.login' | transloco }}
          </button>
        </div>
      </div>
    </div>
  </section>

  <section class="section blue-bg">
    <div class="content-wrapper reverse">
      <div class="image-collage stack">
        <img src="asset_5.png" class="img-large" alt="Salar">
        <img src="asset_4.png" class="img-small" alt="Salar 2">
      </div>
      <div class="text-block white-text">
        <h2>{{ 'landing.subtitle1' | transloco }}</h2>
        <p>{{ 'landing.text1' | transloco }}</p>
      </div>
    </div>
  </section>

  <section class="section white-bg">
    <div class="content-wrapper">
      <div class="image-collage">
         <img src="asset_6.png" class="img-top2" alt="Montaña">
         <img src="asset_7.png" class="img-mid" alt="Iglesia">
         <img src="asset_8.png" class="img-bottom-2" alt="Isla">
      </div>
      <div class="text-block">
        <h2>{{ 'landing.subtitle2' | transloco }}</h2>
        <p>{{ 'landing.text2' | transloco }}</p>
      </div>
    </div>
  </section>

  <section class="section blue-bg center-content">
    <div class="cta-card">
      <img src="asset_9.png" class="full-img" alt="Avión">
      <div class="text-block white-text centered">
        <h3>{{ 'landing.ctaRouteTitle' | transloco }}</h3>
        <p>{{ 'landing.ctaRouteText' | transloco }}</p>
        <button class="btn btn-orange">
            {{ 'landing.freeTrialButton' | transloco }}
        </button>
      </div>
    </div>
  </section>
</div>
<app-footer></app-footer>
