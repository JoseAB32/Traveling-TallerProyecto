<app-header></app-header>

<main class="container-fluid p-0">

  <!-- MAPA -->
  <section class="row align-items-center py-5 px-4 bg-white min-vh-75">
    <div class="col-md-6 text-center">
      <img src="/mapa.png" alt="Mapa de Bolivia" class="img-fluid mapa-vector">
    </div>

    <div class="col-md-6 text-end pe-5">
      <h2 class="display-6 fw-bold text-dark mb-4">
        Selecciona un departamento y <br>
        empieza a explorar la magia de <br>
        cada panorama que ofrece <br>
        Bolivia, un país lleno de cultura.
      </h2>
    </div>
  </section>

  <!-- LUGARES -->
  <section class="py-5 bg-white">
    <div class="container">

      <h3 class="text-orange fw-bold mb-4">
        LUGARES MEJOR CALIFICADOS
      </h3>

      <!-- LOADING -->
      <div *ngIf="isLoading" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>

      <!-- CARRUSEL -->
      <div *ngIf="!isLoading && featuredPlaces.length > 0" class="carousel-wrapper">

        <button class="carousel-btn carousel-btn-prev" (click)="prev()">‹</button>
        <button class="carousel-btn carousel-btn-next" (click)="next()">›</button>

        <div class="row g-4 justify-content-center align-items-stretch">

          <div *ngFor="let place of carouselPlaces; let i = index"
               class="col-12 col-md-4">

            <div
              class="card border-0 shadow-sm travel-card rounded-4"
              [ngClass]="{
                'bg-orange-soft text-dark': i === 1,
                'bg-blue-dark text-white': i !== 1
              }"
              (click)="goToDetail(place.id)"
              style="cursor: pointer;">

              <!-- ✅ IMAGEN CORRECTA -->
              <img
                [src]="place.imageUrl"
                class="card-img-top p-2 rounded-4"
                [alt]="place.name"
              />

              <div class="card-body text-center">

                <h5 class="card-title h6 mb-2">
                  {{ place.name }}
                </h5>

                <div class="stars"
                     [ngClass]="{ 'text-orange': i === 1 }">
                  {{ getStars(place.rating) }}
                </div>

              </div>
            </div>

          </div>
        </div>

        <!-- INDICADORES -->
        <div class="d-flex justify-content-center mt-3 gap-2">
          <button
            *ngFor="let _ of featuredPlaces; index as dotIndex"
            class="btn btn-sm"
            [ngClass]="
              dotIndex === currentIndex
              ? 'btn-primary'
              : 'btn-outline-secondary'
            "
            (click)="goTo(dotIndex)">
            •
          </button>
        </div>

      </div>

    </div>
  </section>

</main>

<app-footer></app-footer>
