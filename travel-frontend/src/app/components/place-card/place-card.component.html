<div class="card-container" [ngClass]="isBlue ? 'theme-blue' : 'theme-orange'">
  <div class="image-section">
    <div class="white-frame">
      <img [src]="place.image_url" [alt]="place.name">
    </div>
  </div>

  <div class="info-section">
    <div class="card-header">
      <h3>{{ place.name }}, {{ place.address }}</h3>
      <i class="bi bi-heart-fill heart-icon" (click)="triggerRemove()" style="cursor: pointer;" title="Quitar de favoritos"></i>
    </div>

    <div class="stars-container">
      @for (star of [1,2,3,4,5]; track $index) {
        <i class="bi" [ngClass]="star <= place.rating ? 'bi-star-fill' : 'bi-star'"></i>
      }
    </div>

    <div class="description-container">
      <span class="label">INFORMACIÓN GENERAL:</span>
      <p>{{ place.description }}</p>
    </div>

    <div class="card-footer">
      <button class="btn-ver-mas">Ver más</button>
    </div>
  </div>
</div>
